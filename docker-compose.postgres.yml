services:
  titomarlon-postgres:
    image: postgres:16-alpine
    container_name: titomarlon-postgres
    env_file:
      - .env.postgres.local
    ports:
      - "55432:5432"
    volumes:
      - titomarlon-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  titomarlon-postgres-data:
